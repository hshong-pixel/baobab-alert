<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카카오 토큰 발급</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: white; border-radius: 16px; padding: 32px; width: 100%; max-width: 480px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
    .kakao-btn { display: flex; align-items: center; justify-content: center; background: #FEE500; color: #191919; border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; margin-bottom: 16px; }
    .token-box { background: #f0f4ff; border-radius: 10px; padding: 16px; margin-top: 16px; display: none; }
    .token-box label { font-size: 12px; font-weight: 600; color: #3A86FF; display: block; margin-bottom: 8px; }
    .token-text { font-size: 11px; word-break: break-all; background: white; padding: 10px; border-radius: 6px; color: #333; line-height: 1.5; }
    .copy-btn { background: #3A86FF; color: white; border: none; border-radius: 8px; padding: 10px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; }
    .status { padding: 12px; border-radius: 8px; font-size: 14px; margin-bottom: 12px; display: none; }
    .info { background: #e3f2fd; color: #1565c0; display: block; }
    .error { background: #ffebee; color: #c62828; display: block; }
  </style>
</head>
<body>
<div class="card">
  <h1>🔑 카카오 토큰 발급</h1>
  <div id="status" class="status"></div>
  <button class="kakao-btn" onclick="kakaoLogin()">카카오 로그인하기</button>
  <div class="token-box" id="tokenBox">
    <label>✅ ACCESS TOKEN (Vercel 환경변수에 복사하세요)</label>
    <div class="token-text" id="accessToken"></div>
    <button class="copy-btn" onclick="copy('accessToken')">📋 Access Token 복사</button>
    <br><br>
    <label>🔄 REFRESH TOKEN (나중에 토큰 갱신용)</label>
    <div class="token-text" id="refreshToken"></div>
    <button class="copy-btn" onclick="copy('refreshToken')" style="background:#666">📋 Refresh Token 복사</button>
  </div>
</div>
<script>
  const REST_API_KEY = 'fa1ff785a7ba7490a2e7b535162a9c37';
  const REDIRECT_URI = 'https://baobab-alert.vercel.app';

  window.onload = function() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    if (code) {
      window.history.replaceState({}, '', window.location.pathname);
      showStatus('info', '토큰 발급 중...');
      getToken(code);
    }
  };

  function kakaoLogin() {
    window.location.href = `https://kauth.kakao.com/oauth/authorize?client_id=${REST_API_KEY}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=code&scope=talk_message`;
  }

  async function getToken(code) {
    try {
      const res = await fetch('https://kauth.kakao.com/oauth/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({ grant_type: 'authorization_code', client_id: REST_API_KEY, redirect_uri: REDIRECT_URI, code })
      });
      const data = await res.json();
      if (data.access_token) {
        document.getElementById('accessToken').textContent = data.access_token;
        document.getElementById('refreshToken').textContent = data.refresh_token || '없음';
        document.getElementById('tokenBox').style.display = 'block';
        showStatus('info', '✅ 토큰 발급 성공! 아래 Access Token을 복사하세요.');
      } else {
        showStatus('error', '실패: ' + (data.error_description || JSON.stringify(data)));
      }
    } catch(e) {
      showStatus('error', '오류: ' + e.message);
    }
  }

  function copy(id) {
    const text = document.getElementById(id).textContent;
    navigator.clipboard.writeText(text).then(() => alert('복사됐어요!'));
  }

  function showStatus(type, msg) {
    const el = document.getElementById('status');
    el.className = 'status ' + type;
    el.textContent = msg;
  }
</script>
</body>
</html>
